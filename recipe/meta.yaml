{% set name = "libtdlpack" %}
{% set version = "1.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/NOAA-MDL/libtdlpack/archive/refs/tags/v{{ version }}.tar.gz
  sha256: dc71552bc9be1e975f9f5f41143fe3104ead37ba7317e2bc77bd6faccb32713c

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('fortran') }}        # [not win]
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib("c") }}                # [not win]
    - make                             # [not win]
    - {{ compiler('m2w64_fortran') }}  # [win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ stdlib("m2w64_c") }}          # [win]
    - ninja                            # [win]
    - cmake
    - pkg-config >=0.21
  host:
    - libgcc        # [linux]
    - libgcc        # [osx]
  run:
    - libgcc        # [linux]
    - libgcc        # [osx]

test:
  commands:
    - test -f ${PREFIX}/lib/libtdlpack${SHLIB_EXT}       # [not win]
    - if not exist %LIBRARY_BIN%\\libtdlpack.dll exit 1  # [win]

about:
  home: https://github.com/NOAA-MDL/libtdlpack
  summary: libtdlpack is a Fortran library with C-bindings for reading and writing TDLPACK files.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - EricEngle-NOAA
